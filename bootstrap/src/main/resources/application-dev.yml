app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32b}
  docs:
    enabled: true
    public-enabled: true

spring:
  flyway:
    locations: classpath:db/migration,classpath:db/migration-dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    co.edu.uniquindio.triage: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
