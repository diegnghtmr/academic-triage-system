server:
  port: 8080
  error:
    include-message: always

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  application:
    name: academic-triage-system
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/triage_db}
    username: ${DB_USER:triage_user}
    password: ${DB_PASS:triage_secret}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    # Solo migraciones compartidas. Perfiles `dev`/`test` en bootstrap añaden `classpath:db/migration-dev`.
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  ai:
    # Keep AI disabled by default until the optional adapter layer is implemented
    # and a valid OpenAI API key is provided.
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:gpt-4o-mini}
          temperature: 0.3

# JWT
app:
  idempotency:
    ttl:
      # Default TTL for business-mutation scopes (requests:*, catalogs:*, business-rules:*, auth:*).
      # 7 days covers typical mobile retry windows and client-side failures.
      default-days: 7
      # Shorter TTL for AI classification suggestions — results are cheap to regenerate.
      ai-days: 1
    cleanup:
      # Cron expression: every 10 minutes. Override with APP_IDEMPOTENCY_CLEANUP_SCHEDULE.
      schedule: "0 */10 * * * *"
      # Rows deleted per cleanup run. Small batches avoid long-lived DELETE locks.
      batch-size: 500
  ai:
    provider: ${APP_AI_PROVIDER:none}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  docs:
    # Outside dev/test docs stay disabled by default. Operators may opt in explicitly with
    # APP_DOCS_ENABLED=true and, unless APP_DOCS_PUBLIC_ENABLED=true is also set, access remains restricted.
    enabled: ${APP_DOCS_ENABLED:false}
    public-enabled: ${APP_DOCS_PUBLIC_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Springdoc
springdoc:
  api-docs:
    enabled: ${app.docs.enabled}
    path: /api-docs
  swagger-ui:
    enabled: ${app.docs.enabled}
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
