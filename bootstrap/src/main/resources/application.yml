server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: academic-triage-system
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/triage_db}
    username: ${DB_USER:triage_user}
    password: ${DB_PASS:triage_secret}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  ai:
    # Keep AI disabled by default until the optional adapter layer is implemented
    # and a valid OpenAI API key is provided.
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:gpt-4o-mini}
          temperature: 0.3

# JWT
app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-me}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# Springdoc
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
