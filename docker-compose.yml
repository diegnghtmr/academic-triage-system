services:
  mariadb:
    image: mariadb:11
    container_name: triage-mariadb
    environment:
      MARIADB_DATABASE: triage_db
      MARIADB_USER: ${DB_USER:-triage_user}
      MARIADB_PASSWORD: ${DB_PASS:-triage_secret}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS:-root_secret}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: triage-adminer
    ports:
      - "8081:8080"
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:
